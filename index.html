<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIP CALCULATOR</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
  <div class="container">
      <h1>May's Tip Calculator</h1>

      <div class="input-group">
         <label for="name">Staff name:</label>
         <input type="text" id="name" placeholder="Enter staff name">
        </div>

        <div class="input-group">
         <label for="billAmount">Bill Amount:</label>
         <input type="number" id="billAmount" placeholder="Enter bill amount">
        </div>

        <div class="input-group">
          <label for="tipPercentage">Tip Percentage:</label>
            <select id="tipPercentage">
                <option value="" selected disabled>Select Tip %</option>
                <option value="0">0</option>
                <option value="5">5%</option>
                <option value="10">10%</option>
                <option value="15">15%</option>
                <option value="20">20%</option>
            </select>        
        </div>

        <div class="input-group">
         <label for="tipAmount">Tip Amount:</label>
         <input type="number" id="tipAmount" placeholder="Enter tip amount" readonly>
        </div>

        <div class="input-group">
         <label for="totalBill">Total Bill:</label>
         <input type="number" id="totalBill" placeholder="Enter total bill" readonly>
        </div>

       <button id="btn" class="btttn">Calculate Tip</button>
       <div id="result"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
